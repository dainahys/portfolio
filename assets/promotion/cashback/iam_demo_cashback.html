<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR 캐시백 프로모션 — Braze IAM 인터랙티브 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif; background: #0f0f14; color: #e2e8f0; }
    @keyframes hintPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ov-in { from{opacity:0} to{opacity:1} }
    @keyframes sh-up { from{transform:translateY(-16px) scale(0.97);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── 구간 테이블 ──
const TIERS = [
  {min:0,  max:2,  r:0},
  {min:3,  max:5,  r:0.03},
  {min:6,  max:10, r:0.05},
  {min:11, max:15, r:0.08},
  {min:16, max:20, r:0.10},
  {min:21, max:25, r:0.13},
  {min:26, max:30, r:0.15},
  {min:31, max:999,r:0.20},
];
const TIER_JUMPS = [3,6,11,16,21,26,31];

function getTierIdx(n) { return TIERS.findIndex(t => n >= t.min && n <= t.max); }
function getNextThreshold(n) {
  const jumps = [3,6,11,16,21,26,31];
  return jumps.find(j => j > n) || 0;
}
function getTierRate(n) { return TIERS[getTierIdx(n)].r * 100; }
function won(n) { return '₩ ' + Math.round(n).toLocaleString('ko-KR'); }
function wonShort(n) { return '₩' + Math.round(n).toLocaleString('ko-KR'); }

// ── CSS 인라인 스타일 상수 ──
const C = {
  p10:'#F6F4FF', p100:'#E3DEFF', p200:'#C9C0FF', p500:'#693BF2', p600:'#5530CC',
  tp:'#1C242F', ts:'#6B7280', tm:'#9CA3AF',
};

// ── IAM 1: 보너스캐시 계산기 (딥링크 진입 / 마이페이지) ──
const BonusCashCalc = ({mockCount, mockSum, onLog, onClose}) => {
  const [tab, setTab] = useState(1);
  const [cnt, setCnt] = useState('');
  const [fee, setFee] = useState('');

  const cntNum = parseInt(cnt) || 0;
  const feeNum = parseInt(fee) || 0;
  const tierIdx = getTierIdx(cntNum);
  const tier = TIERS[tierIdx];
  const nextT = getNextThreshold(cntNum);
  const remaining = nextT ? nextT - cntNum : 0;
  const prevT = nextT ? nextT - remaining - 1 : 30;
  const progWidth = nextT ? Math.min(100, Math.max(0, (cntNum - prevT) / (nextT - prevT) * 100)) : 100;
  const hasInput = cntNum > 0 || feeNum > 0;
  const cashback = tier.r > 0 ? cntNum * feeNum * tier.r : 0;

  const BARS = [
    {r:0,  label:'~2건'},
    {r:3,  label:'3~5건'},
    {r:5,  label:'6~10건'},
    {r:8,  label:'11~15건'},
    {r:10, label:'16~20건'},
    {r:13, label:'21~25건'},
    {r:15, label:'26~30건'},
    {r:20, label:'31건+'},
  ];
  const barHeights = [8,16,24,32,40,48,56,64];

  const close = () => {
    onLog({kind:'close', msg:'closeMessage()'});
    onClose();
  };

  const switchTab = (n) => {
    setTab(n);
    onLog({kind:'mock', msg:`탭 전환 → ${n===1?'예상 계산기':'누적 보너스캐시'}`});
  };

  // styles
  const modalStyle = {
    width:'calc(100% - 0px)', maxWidth:355, background:'#fff', borderRadius:20,
    display:'flex', flexDirection:'column', maxHeight:'90vh',
    animation:'sh-up 0.34s cubic-bezier(0.22,1,0.36,1)', overflow:'hidden',
    boxShadow:'0 24px 80px rgba(0,0,0,0.4)',
  };
  const overlayStyle = {
    position:'relative',
    background:'transparent',
    display:'flex', alignItems:'center', justifyContent:'center',
    padding:'20px 16px',
    animation:'ov-in 0.2s ease',
  };

  return (
    <div style={overlayStyle} onClick={e => e.target===e.currentTarget && close()}>
      <div style={modalStyle}>
        {/* topbar */}
        <div style={{padding:'10px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0}}>
          <span style={{fontSize:11, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', color:C.p500}}>보너스캐시</span>
          <button onClick={close} style={{width:30,height:30,borderRadius:'50%',background:C.p10,border:'none',cursor:'pointer',fontSize:13,color:C.ts,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        {/* tab bar */}
        <div style={{display:'flex', borderBottom:`1.5px solid #EEEDF5`, margin:'8px 0 0', flexShrink:0, padding:'0 20px'}}>
          {[{n:1,label:'예상 계산기'},{n:2,label:'누적 보너스캐시'}].map(t => (
            <button key={t.n} onClick={()=>switchTab(t.n)} style={{flex:1,height:44,background:'none',border:'none',borderBottom:`2.5px solid ${tab===t.n?C.p500:'transparent'}`,marginBottom:-1.5,fontFamily:'inherit',fontSize:14,fontWeight:600,color:tab===t.n?C.p500:C.tm,cursor:'pointer',letterSpacing:-0.01,transition:'all 0.15s'}}>{t.label}</button>
          ))}
        </div>
        {/* body */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px 0',display:'flex',flexDirection:'column',gap:15}}>

          {/* TAB 1 */}
          {tab===1 && <>
            {/* 건수 입력 */}
            <div style={{display:'flex',alignItems:'center',width:'100%',height:80,background:C.p10,borderRadius:15,border:'1px solid transparent',overflow:'hidden'}}>
              <button onClick={()=>setCnt(String(Math.max(0,cntNum-1)))} style={{width:44,height:80,background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.ts,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                <div style={{fontSize:11,fontWeight:600,color:C.tm,letterSpacing:-0.01}}>예상 견적 발송 건수</div>
                <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                  <input type="number" value={cnt} onChange={e=>setCnt(e.target.value)} placeholder="0"
                    style={{background:'none',border:'none',outline:'none',fontFamily:'Roboto Mono,monospace',fontSize:24,fontWeight:600,color:C.tp,textAlign:'center',width:80,letterSpacing:-0.02}}/>
                  <span style={{fontSize:13,fontWeight:600,color:C.ts}}>건</span>
                </div>
              </div>
              <button onClick={()=>setCnt(String(cntNum+1))} style={{width:44,height:80,background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.ts,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>

            {/* 금액 입력 */}
            <div style={{display:'flex',alignItems:'center',width:'100%',height:80,background:C.p10,borderRadius:15,border:`1px solid ${C.p100}`,overflow:'hidden'}}>
              <button onClick={()=>setFee(String(Math.max(0,feeNum-100)))} style={{width:44,height:80,background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.ts,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                <div style={{fontSize:11,fontWeight:600,color:C.tm,letterSpacing:-0.01}}>건당 견적 발송 금액</div>
                <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                  <input type="number" value={fee} onChange={e=>setFee(e.target.value)} placeholder="0"
                    style={{background:'none',border:'none',outline:'none',fontFamily:'Roboto Mono,monospace',fontSize:24,fontWeight:600,color:C.tp,textAlign:'center',width:80,letterSpacing:-0.02}}/>
                  <span style={{fontSize:13,fontWeight:600,color:C.ts}}>원</span>
                </div>
              </div>
              <button onClick={()=>setFee(String(feeNum+100))} style={{width:44,height:80,background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.ts,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>

            {/* 계단 차트 */}
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{fontSize:11,fontWeight:700,color:C.ts}}>리워드 구간</div>
                <div style={{fontSize:11,fontWeight:700,color:C.p500}}>
                  {!hasInput ? '—' : tier.r===0 ? `${3-cntNum}건 → 캐시백 시작` : nextT ? `${nextT-cntNum}건 더 → ${TIERS[getTierIdx(cntNum)+1]?.r*100||20}%` : '🏆 최고 구간!'}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'flex-end',gap:3,height:64}}>
                {BARS.map((b,i) => {
                  const isPassed = i < tierIdx;
                  const isActive = i === tierIdx && hasInput;
                  return (
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                      <div style={{fontSize:isActive?10:0,color:isActive?C.p500:'transparent',fontFamily:'Roboto Mono,monospace',fontWeight:700,marginBottom:3,transition:'all 0.2s',lineHeight:1,whiteSpace:'nowrap'}}>{b.r}%</div>
                      <div style={{width:'100%',borderRadius:'4px 4px 0 0',background:isActive?C.p500:isPassed?C.p100:C.p10,borderTop:`2px solid ${isActive?'rgba(255,255,255,0.3)':isPassed?C.p200:C.p100}`,height:barHeights[i],transition:'all 0.25s',boxShadow:isActive?'0 0 12px rgba(105,59,242,0.28)':undefined}}/>
                    </div>
                  );
                })}
              </div>
              <div style={{display:'flex',gap:3}}>
                {BARS.map((b,i) => {
                  const isPassed = i < tierIdx;
                  const isActive = i === tierIdx && hasInput;
                  return <div key={i} style={{flex:1,textAlign:'center',fontSize:isActive?8:7.5,fontWeight:isActive?800:600,color:isActive?C.p500:isPassed?C.p200:C.tm,whiteSpace:'nowrap',overflow:'hidden'}}>{b.label}</div>;
                })}
              </div>
            </div>

            {/* 결과 카드 */}
            <div style={{display:'flex',alignItems:'center',width:'100%',height:80,background:C.p10,borderRadius:15,border:`1px solid ${hasInput&&tier.r>0?C.p500:C.p100}`,overflow:'hidden',padding:'0 18px',justifyContent:'space-between',transition:'border-color 0.15s'}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:hasInput&&tier.r>0?C.p500:C.tm,letterSpacing:'0.04em',textTransform:'uppercase',marginBottom:4}}>리워드 비율</div>
                <div style={{fontSize:hasInput&&tier.r>0?22:16,fontWeight:700,color:hasInput&&tier.r>0?C.p500:C.tm,letterSpacing:-0.02,lineHeight:1}}>
                  {hasInput ? `${tier.r*100}%` : '—'}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,fontWeight:700,color:hasInput&&tier.r>0?C.p500:C.tm,letterSpacing:'0.04em',textTransform:'uppercase',marginBottom:4}}>예상 캐시백</div>
                <div style={{fontFamily:'Roboto Mono,monospace',fontSize:hasInput&&tier.r>0?18:14,fontWeight:600,color:hasInput&&tier.r>0?C.p500:C.tm,letterSpacing:-0.02,lineHeight:1}}>
                  {hasInput && tier.r>0 ? wonShort(cashback) : '₩ —'}
                </div>
              </div>
            </div>

            {/* 프로그레스 */}
            <div style={{width:'100%',height:8,background:C.p10,borderRadius:555,overflow:'hidden'}}>
              <div style={{height:'100%',background:C.p500,borderRadius:555,width:`${Math.min(100,cntNum/31*100)}%`,transition:'width 0.4s cubic-bezier(0.22,1,0.36,1)'}}/>
            </div>

            {/* 넛지 */}
            <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,fontWeight:500,color:hasInput?C.p500:C.ts,lineHeight:1.5}}>
              <span>💡</span>
              <span>
                {!hasInput ? '건수와 발송 금액을 입력하면 자동으로 계산돼요'
                  : tier.r===0 ? `🎯 ${3-cntNum}건만 더 보내면 3% 캐시백이 시작돼요!`
                  : nextT ? `🎯 ${nextT-cntNum}건 더 → ${TIERS[tierIdx+1]?.r*100}% (약 ${wonShort(nextT*feeNum*(TIERS[tierIdx+1]?.r||0))} 예상)`
                  : '🏆 최고 요율 20% 구간에 도달했어요!'}
              </span>
            </div>
          </>}

          {/* TAB 2 */}
          {tab===2 && <>
            <div style={{width:'100%',height:80,background:C.p500,borderRadius:15,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 18px'}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,0.6)',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:4}}>이번 달 누적</div>
                <div style={{fontFamily:'Roboto Mono,monospace',fontSize:22,fontWeight:600,color:'#fff',letterSpacing:-0.02,lineHeight:1}}>{won(mockSum)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.65)',marginBottom:5}}>{mockCount}건 발송 · {getTierRate(mockCount)}% 적용</div>
                <div style={{display:'inline-block',background:'rgba(255,255,255,0.18)',color:'#fff',fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:100,border:'1px solid rgba(255,255,255,0.25)'}}>
                  {getNextThreshold(mockCount) ? `${getNextThreshold(mockCount)-mockCount}건 더 → ${getTierRate(getNextThreshold(mockCount))}% ↑` : '🏆 최고 구간 달성!'}
                </div>
              </div>
            </div>

            {getNextThreshold(mockCount) > 0 && (() => {
              const nt = getNextThreshold(mockCount);
              const rem = nt - mockCount;
              const pt = nt - rem - 1;
              const pw = Math.min(100, Math.max(0, (mockCount - pt) / (nt - pt) * 100));
              return (
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:11,fontWeight:700,color:C.ts}}>현재 {getTierRate(mockCount)}% 구간</span>
                    <span style={{fontSize:11,fontWeight:700,color:C.p500}}>{nt}건까지 {rem}건 남음</span>
                  </div>
                  <div style={{width:'100%',height:8,background:C.p10,borderRadius:555,overflow:'hidden'}}>
                    <div style={{height:'100%',background:C.p500,borderRadius:555,width:`${pw}%`,transition:'width 0.4s'}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
                    <span style={{fontFamily:'Roboto Mono,monospace',fontSize:10,color:C.tm}}>{pt}건</span>
                    <span style={{fontFamily:'Roboto Mono,monospace',fontSize:10,color:C.p500,fontWeight:600}}>{mockCount} / {nt}</span>
                    <span style={{fontFamily:'Roboto Mono,monospace',fontSize:10,color:C.tm}}>{nt}건</span>
                  </div>
                </div>
              );
            })()}

            {mockCount === 0 && (
              <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,fontWeight:500,color:C.p500,lineHeight:1.5,background:C.p10,borderRadius:12,padding:'14px 16px'}}>
                <span>💸</span><span>아직 적립된 보너스캐시가 없어요.<br/>지금 적립을 시작하세요!</span>
              </div>
            )}
          </>}
        </div>

        {/* footer */}
        <div style={{padding:'12px 20px 28px',flexShrink:0}}>
          <button onClick={()=>{onLog({kind:'mock',msg:'[받은 요청 보러 가기] → 홈 이동'});close();}} style={{width:'100%',height:48,background:C.p500,borderRadius:8,border:'none',fontFamily:'inherit',fontWeight:600,fontSize:16,color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.15s'}}>받은 요청 보러 가기</button>
        </div>
      </div>
    </div>
  );
};

// ── IAM 2: 견적 발송 시 트리거 알림 ──
const QuoteSentModal = ({mockCount, mockSum, mockServiceName, mockPrice, onLog, onClose}) => {
  const newCount = mockCount;
  const newSum = mockSum;
  const tierRate = getTierRate(newCount);
  const nextT = getNextThreshold(newCount);
  const remaining = nextT ? nextT - newCount : 0;
  const nextRate = nextT ? getTierRate(nextT) : 0;
  const isTierJump = TIER_JUMPS.includes(newCount);
  const prevT = nextT ? nextT - remaining - 1 : 30;
  const progWidth = nextT ? Math.min(100, Math.max(0, (newCount - prevT) / (nextT - prevT) * 100)) : 100;
  const earnedThisQuote = Math.round(mockPrice * tierRate / 100);

  const close = () => {
    onLog({kind:'close', msg:'closeMessage()'});
    onClose();
  };

  useEffect(() => {
    if (!isTierJump) {
      onLog({kind:'mock', msg:`구간 점프 없음 (${newCount}건) → 즉시 closeMessage()`});
      onLog({kind:'close', msg:'closeMessage() — 자동 닫힘'});
    } else {
      onLog({kind:'event', msg:'logCustomEvent(\'view_bonus_cash_modal\')', props:{sent_quote_count: newCount, tier_rate: tierRate, is_tier_jump: true}});
      onLog({kind:'flush', msg:'requestImmediateDataFlush()'});
    }
  }, []);

  const overlayStyle = {
    position:'relative',
    background:'transparent',
    display:'flex', alignItems:'center', justifyContent:'center',
    padding:'20px 16px',
    animation:'ov-in 0.2s ease',
  };
  const modalStyle = {
    width:'calc(100% - 0px)', maxWidth:355, background:'#fff', borderRadius:20,
    display:'flex', flexDirection:'column', maxHeight:'90vh',
    animation:'sh-up 0.34s cubic-bezier(0.22,1,0.36,1)', overflow:'hidden',
    boxShadow:'0 24px 80px rgba(0,0,0,0.4)',
  };

  if (!isTierJump) {
    return (
      <div style={overlayStyle}>
        <div style={{...modalStyle, alignItems:'center', justifyContent:'center', padding:32, gap:12, background:'#1C242F'}}>
          <div style={{fontSize:32}}>⚡</div>
          <div style={{fontSize:14,fontWeight:700,color:'rgba(255,255,255,0.9)',textAlign:'center'}}>구간 점프 없음</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',textAlign:'center',lineHeight:1.6}}>현재 {newCount}건 — 구간 경계가 아니므로<br/>IAM이 즉시 닫힙니다</div>
          <div style={{fontSize:11,fontFamily:'DM Mono,monospace',color:C.p200,background:'rgba(105,59,242,0.2)',borderRadius:8,padding:'8px 14px',textAlign:'center'}}>
            다음 구간 점프: {nextT}건
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={overlayStyle} onClick={e => e.target===e.currentTarget && close()}>
      <div style={modalStyle}>
        <div style={{padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0}}>
          <span style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:C.p500}}>누적 보너스캐시</span>
          <button onClick={close} style={{width:30,height:30,borderRadius:'50%',background:C.p10,border:'none',cursor:'pointer',fontSize:13,color:C.ts,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px 0',display:'flex',flexDirection:'column',gap:15}}>
          {/* hero */}
          <div style={{width:'100%',height:80,background:C.p500,borderRadius:15,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 18px'}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,0.6)',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:4}}>이번 달 누적</div>
              <div style={{fontFamily:'Roboto Mono,monospace',fontSize:22,fontWeight:600,color:'#fff',letterSpacing:-0.02,lineHeight:1}}>{won(newSum)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.65)',marginBottom:5}}>{newCount}건 발송 · {tierRate}% 적용</div>
              <div style={{display:'inline-block',background:'rgba(255,255,255,0.18)',color:'#fff',fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:100,border:'1px solid rgba(255,255,255,0.25)'}}>
                {nextT ? `${remaining}건 더 → ${nextRate}% ↑` : '🏆 최고 구간 달성!'}
              </div>
            </div>
          </div>

          {/* progress */}
          {nextT > 0 && (
            <div>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:C.ts}}>현재 {tierRate}% 구간</span>
                <span style={{fontSize:11,fontWeight:700,color:C.p500}}>{nextT}건까지 {remaining}건 남음</span>
              </div>
              <div style={{width:'100%',height:8,background:C.p10,borderRadius:555,overflow:'hidden'}}>
                <div style={{height:'100%',background:C.p500,borderRadius:555,width:`${progWidth}%`,transition:'width 0.4s'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
                <span style={{fontFamily:'Roboto Mono,monospace',fontSize:10,color:C.tm}}>{prevT}건</span>
                <span style={{fontFamily:'Roboto Mono,monospace',fontSize:10,color:C.p500,fontWeight:600}}>{newCount} / {nextT}</span>
                <span style={{fontFamily:'Roboto Mono,monospace',fontSize:10,color:C.tm}}>{nextT}건</span>
              </div>
            </div>
          )}

          {/* 견적 내역 */}
          <div style={{display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'11px 0',borderBottom:'1px solid #EEEDF5'}}>
              <div style={{width:34,height:34,borderRadius:10,background:C.p10,border:`1px solid ${C.p100}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0}}>📋</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.tp,letterSpacing:-0.02,marginBottom:1}}>{mockServiceName} 견적</div>
                <div style={{fontSize:11,color:C.tm}}>방금 발송 · ₩{mockPrice.toLocaleString('ko-KR')}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontFamily:'Roboto Mono,monospace',fontSize:13,fontWeight:600,color:C.p500}}>+₩{earnedThisQuote.toLocaleString('ko-KR')}</div>
                <div style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:100,display:'inline-block',marginTop:2,background:C.p10,color:C.p500}}>적립 예정</div>
              </div>
            </div>
          </div>

          {/* 타일 */}
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            {[
              {label:'이번달',val:`${newCount}건`,bg:C.p10,vc:C.tp},
              {label:'적용',val:`${tierRate}%`,bg:'#E3DEFF',vc:C.tp},
              {label:'누적',val:`₩${newSum.toLocaleString('ko-KR')}`,bg:C.p500,vc:'#fff'},
            ].map((t,i) => (
              <div key={i} style={{width:63,height:63,borderRadius:16,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,background:t.bg,flex:1}}>
                <div style={{fontSize:10,fontWeight:600,color:t.bg===C.p500?'rgba(255,255,255,0.7)':C.tm}}>{t.label}</div>
                <div style={{fontFamily:'Pretendard Variable,Pretendard,sans-serif',fontWeight:700,fontSize:12,lineHeight:1.3,textAlign:'center',letterSpacing:-0.02,color:t.vc}}>{t.val}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{padding:'12px 20px 28px',flexShrink:0}}>
          <button onClick={()=>{onLog({kind:'mock',msg:'[받은 요청 보러 가기] → 홈 이동'});close();}} style={{width:'100%',height:48,background:C.p500,borderRadius:8,border:'none',fontFamily:'inherit',fontWeight:600,fontSize:16,color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>받은 요청 보러 가기</button>
        </div>
      </div>
    </div>
  );
};

// ── LogEntry ──
const LogEntry = ({item}) => {
  const styles = {
    brazeBridge:{bg:'#EDE9FE',border:'#693BF2',tag:'BRAZE',tc:'#6D28D9'},
    attr:       {bg:'#D1FAE5',border:'#10B981',tag:'ATTR',tc:'#065F46'},
    event:      {bg:'#DBEAFE',border:'#3B82F6',tag:'EVENT',tc:'#1E40AF'},
    flush:      {bg:'#FEF3C7',border:'#F59E0B',tag:'FLUSH',tc:'#92400E'},
    page:       {bg:'#F3E8FF',border:'#A855F7',tag:'PAGE',tc:'#6B21A8'},
    close:      {bg:'#FCE7F3',border:'#DB2777',tag:'CLOSE',tc:'#9D174D'},
    mock:       {bg:'#FDF2F8',border:'#FBCFE8',tag:'MOCK',tc:'#BE185D'},
    info:       {bg:'#FFF1F5',border:'#FCE7F3',tag:'INFO',tc:'#9D4466'},
  };
  const s = styles[item.kind] || styles.info;
  return (
    <div style={{background:s.bg,borderLeft:`2px solid ${s.border}`,borderRadius:6,padding:'7px 10px',animation:'fadeIn 0.2s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
        <span style={{fontSize:9,fontWeight:700,color:s.tc,background:s.border+'25',padding:'1px 5px',borderRadius:3,letterSpacing:'0.06em'}}>{s.tag}</span>
        <span style={{fontSize:10,color:'#9CA3AF'}}>{item.time}</span>
      </div>
      <div style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'#1C242F',lineHeight:1.5,wordBreak:'break-all'}}>{item.msg}</div>
      {item.props && <div style={{fontSize:10,fontFamily:'DM Mono,monospace',color:'#6B7280',marginTop:3,lineHeight:1.5}}>{JSON.stringify(item.props,null,1)}</div>}
    </div>
  );
};

// ── Main App ──
const App = () => {
  const [tab, setTab] = useState('calc');
  const [logs, setLogs] = useState([]);
  const [showModal, setShowModal] = useState(true);
  const logRef = useRef(null);

  // Mock settings
  const [mockCount, setMockCount] = useState(5);
  const [mockSum, setMockSum] = useState(4500);
  const [mockServiceName, setMockServiceName] = useState('이사');
  const [mockPrice, setMockPrice] = useState(3000);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs]);

  const addLog = useCallback((entry) => {
    const time = new Date().toLocaleTimeString('ko',{hour12:false});
    setLogs(prev => [...prev, {...entry, time}]);
  }, []);

  const switchTab = (id) => {
    setTab(id);
    setShowModal(true);
    setLogs([]);
  };

  const TAB_INFO = {
    calc:  {label:'① 보너스캐시 계산기', sub:'마이페이지 딥링크 진입'},
    quote: {label:'② 견적 발송 트리거',  sub:'구간 점프 시 노출'},
  };

  const MOCK_CONFIGS = {
    calc: [
      {id:'count', label:'현재 건수', opts:['0','2','3','5','6','10','11','15'], val:String(mockCount), set:v=>{setMockCount(Number(v));setMockSum(Number(v)*900);}},
    ],
    quote: [
      {id:'count', label:'발송 후 건수', opts:['3','6','11','16','21','26','31','5','8'], val:String(mockCount), set:v=>{setMockCount(Number(v));setMockSum(Number(v)*900);}},
      {id:'price', label:'견적 금액', opts:['1000','3000','5000','10000'], val:String(mockPrice), set:v=>setMockPrice(Number(v))},
    ],
  };
  const mocks = MOCK_CONFIGS[tab] || [];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#FDF2F8',fontFamily:'Pretendard Variable, Pretendard, -apple-system, sans-serif'}}>

      {/* Header */}
      <div style={{padding:'14px 20px',borderBottom:'1px solid #FCE7F3',display:'flex',background:'#fff',alignItems:'center',gap:12,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,background:'#DB2777',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#fff'}}>숨</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#9D174D',letterSpacing:-0.3}}>QR 캐시백 프로모션</div>
            <div style={{fontSize:10,color:'#BE185D',fontFamily:'DM Mono,monospace',letterSpacing:'0.05em'}}>BRAZE IAM — INTERACTIVE DEMO</div>
          </div>
        </div>
        <div style={{display:'flex',gap:4,marginLeft:16}}>
          {Object.entries(TAB_INFO).map(([id,info]) => (
            <button key={id} onClick={()=>switchTab(id)}
              style={{padding:'5px 10px',borderRadius:6,border:`1px solid ${tab===id?'#DB2777':'#FCE7F3'}`,background:tab===id?'#DB2777':'#fff',color:tab===id?'#fff':'#BE185D',fontSize:11,cursor:'pointer',transition:'all 0.15s',fontFamily:'inherit',lineHeight:1.4,textAlign:'left'}}>
              <div style={{fontWeight:600}}>{info.label}</div>
              <div style={{fontSize:9,opacity:0.7}}>{info.sub}</div>
            </button>
          ))}
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          {!showModal && <button onClick={()=>{setShowModal(true);setLogs([]);}} style={{padding:'5px 12px',borderRadius:6,border:'1px solid #FCE7F3',background:'#FFF1F5',color:'#BE185D',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>↺ 다시 열기</button>}
          <button onClick={()=>setLogs([])} style={{padding:'5px 12px',borderRadius:6,border:'1px solid #FCE7F3',background:'#FFF1F5',color:'#9D174D',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>로그 지우기</button>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>

        {/* Left */}
        <div style={{width:400,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',padding:'24px 16px',background:'#fff',borderRight:'1px solid #FCE7F3',overflowY:'auto',gap:20}}>
          <div style={{fontSize:10,fontFamily:'DM Mono,monospace',color:'#BE185D',letterSpacing:'0.08em',textTransform:'uppercase'}}>Phone Preview · 355px</div>

          {/* 모달 프리뷰 */}
          <div style={{borderRadius:16,overflow:'visible',boxShadow:'0 0 0 1px rgba(105,59,242,0.3), 0 32px 80px rgba(105,59,242,0.2)',background:'transparent',width:355,position:'relative',flexShrink:0}}>
            {showModal ? (
              tab === 'calc'
                ? <BonusCashCalc mockCount={mockCount} mockSum={mockSum} onLog={addLog} onClose={()=>setShowModal(false)}/>
                : <QuoteSentModal mockCount={mockCount} mockSum={mockSum} mockServiceName={mockServiceName} mockPrice={mockPrice} onLog={addLog} onClose={()=>setShowModal(false)}/>
            ) : (
              <div style={{padding:32,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,minHeight:200}}>
                <div style={{fontSize:28}}>✓</div>
                <div style={{fontSize:13,color:'rgba(255,255,255,0.5)',fontFamily:'DM Mono,monospace',textAlign:'center'}}>모달 닫힘<br/>↺ 다시 열기로 재시작</div>
              </div>
            )}
          </div>

          {/* Mock controls */}
          {mocks.length > 0 && (
            <div style={{width:'100%',background:'#FFF1F5',border:'1px solid #FCE7F3',borderRadius:10,padding:14}}>
              <div style={{fontSize:10,fontFamily:'DM Mono,monospace',color:'#BE185D',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:12,fontWeight:600}}>Mock 설정</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {mocks.map(m => (
                  <div key={m.id} style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'#BE185D',width:76,flexShrink:0}}>{m.label}</span>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {m.opts.map(opt => (
                        <button key={opt} onClick={()=>{m.set(opt);setShowModal(true);setLogs([]);}}
                          style={{padding:'4px 9px',borderRadius:5,border:`1px solid ${m.val===opt?'#DB2777':'#FCE7F3'}`,background:m.val===opt?'#DB2777':'#fff',color:m.val===opt?'#fff':'#BE185D',fontSize:11,cursor:'pointer',transition:'all 0.15s',fontFamily:'DM Mono,monospace'}}>
                          {opt}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              {tab==='quote' && (
                <div style={{marginTop:10,padding:'8px 10px',background:'#FCE7F3',borderRadius:6,fontSize:10,fontFamily:'DM Mono,monospace',color:'#9D174D',lineHeight:1.5}}>
                  {TIER_JUMPS.includes(mockCount) ? `✅ ${mockCount}건 = 구간 점프 → IAM 노출` : `⚡ ${mockCount}건 = 구간 점프 없음 → 즉시 닫힘`}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Right: log */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#FFF1F5'}}>
          <div style={{padding:'10px 16px',borderBottom:'1px solid rgba(219,39,119,0.2)',display:'flex',alignItems:'center',gap:8,flexShrink:0,background:'#FCE7F3'}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#DB2777',animation:'hintPulse 1.5s ease-in-out infinite'}}/>
            <span style={{fontSize:11,fontFamily:'DM Mono,monospace',color:'#BE185D',letterSpacing:'0.06em',textTransform:'uppercase'}}>brazeBridge Mock — 실시간 이벤트 로그</span>
          </div>
          <div ref={logRef} style={{flex:1,overflowY:'auto',padding:12,display:'flex',flexDirection:'column',gap:5}}>
            {logs.length === 0
              ? <div style={{textAlign:'center',color:'#F9A8D4',fontSize:12,fontFamily:'DM Mono,monospace',marginTop:40}}>모달과 상호작용하면 로그가 여기 표시됩니다</div>
              : logs.map((item,i) => <LogEntry key={i} item={item}/>)
            }
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
