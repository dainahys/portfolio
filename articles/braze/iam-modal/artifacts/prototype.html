    </div>

  const OsPrompt = () => (

      case 'home_fail': return <HomeScreen success={false} />;
      case 'exit': return <ExitScreen />;
      default: return <WebScreen />;

  };

  const logStyles = {
    section: { background: '#1f1f2b', borderLeft: '3px solid #8a8694' },
